<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Buikboek</title>
  <link rel="icon" type="image/jpeg" sizes="192x192" href="buikboek-icon-192.jpg?v=203">
  <link rel="shortcut icon" type="image/jpeg" href="buikboek-icon-192.jpg?v=203">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=13">
  <link rel="manifest" href="site.webmanifest?v=203">
  <meta name="theme-color" content="#090806">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Buikboek">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Buikboek">
  <style>
    html,body{margin:0;width:100%;height:100%;background:#090806;overflow:hidden}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#090806}
  </style>
</head>
<body>
  <iframe id="buikboek-frame" src="kookboek-v15-updated-specials-1.html?v=buikboek-203" title="Buikboek"></iframe>
  <script>
    (function(){
      function makeCard(doc,id,emoji,title,subtitle,ingredients,method,imageSrc){
        var card=doc.createElement('article');
        card.className='recipe-card';
        card.id=id;
        var list='';
        for(var i=0;i<ingredients.length;i++) list+='<li>'+ingredients[i]+'</li>';
        var photo=imageSrc?'<img class="recipe-photo" src="'+imageSrc+'" alt="'+title+'" loading="lazy" referrerpolicy="no-referrer">':'';
        card.innerHTML=photo+'<div class="recipe-head"><div class="emoji">'+emoji+'</div><div><h3>'+title+'</h3><p>'+subtitle+'</p></div></div><ul>'+list+'</ul><div class="method"><b>Bereiding:</b> '+method+'</div>';
        return card;
      }

      function headingText(section){
        var h=section.querySelector('h1,h2,h3');
        return h ? h.textContent.replace(/\s+/g,' ').trim().toLowerCase() : '';
      }

      function findSection(doc,words){
        var sections=doc.querySelectorAll('section,.section');
        for(var i=0;i<sections.length;i++){
          var t=headingText(sections[i]);
          for(var j=0;j<words.length;j++) if(t.indexOf(words[j])!==-1) return sections[i];
        }
        return null;
      }

      function gridFor(doc,section){
        var grid=section.querySelector('.grid');
        if(!grid){grid=doc.createElement('div');grid.className='grid';section.appendChild(grid);}
        return grid;
      }

      function insertBeforeFooter(doc,section){
        var footer=doc.querySelector('.footer,footer');
        if(footer && footer.parentNode) footer.parentNode.insertBefore(section,footer);
        else doc.body.appendChild(section);
      }

      function addNavLink(doc,id,label){
        var nav=doc.querySelector('.nav');
        if(!nav || nav.querySelector('a[href="#'+id+'"]')) return;
        var a=doc.createElement('a');
        a.href='#'+id;
        a.textContent=label;
        nav.appendChild(a);
      }

      function inject(){
        var frame=document.getElementById('buikboek-frame');
        var doc;
        try{doc=frame.contentDocument || frame.contentWindow.document;}catch(e){return false;}
        if(!doc || !doc.body) return false;

        var sauces=findSection(doc,['sausjes & dips','sauzen & dips','sausjes','sauzen','dips']);
        if(!sauces){
          sauces=doc.createElement('section');
          sauces.className='section gold';
          sauces.id='sausjes-en-dips';
          sauces.innerHTML='<h2>SAUSJES & DIPS</h2><div class="grid"></div>';
          insertBeforeFooter(doc,sauces);
        }
        if(!sauces.id) sauces.id='sausjes-en-dips';
        addNavLink(doc,sauces.id,'Sausjes & Dips');

        if(!doc.getElementById('sticky-korean-honey-chili-saus')){
          gridFor(doc,sauces).appendChild(makeCard(doc,'sticky-korean-honey-chili-saus','🍯🌶️','Sticky Korean Honey Chili Saus','Pittig zoet • honingachtig • zonder koken',['3 el honing','1 el gochujang','1 el sweet chilisaus','1 tl sojasaus','1 tl rijstazijn of natuurazijn','Klein scheutje sesamolie, optioneel','Snufje MSG, optioneel'],'Meng alles koud tot een gladde, kleverige saus. Lekker over hete krokante kip of als dip. Meer honing maakt hem zoeter, meer gochujang pittiger en meer azijn frisser.','images/sticky-korean-honey-chili-ai.svg?v=1'));
        }

        var sides=findSection(doc,['bijgerechten']);
        if(!sides){
          sides=doc.createElement('section');
          sides.className='section gold';
          sides.id='bijgerechten';
          sides.innerHTML='<h2>BIJGERECHTEN</h2><div class="grid"></div>';
          insertBeforeFooter(doc,sides);
        }
        if(!sides.id) sides.id='bijgerechten';
        addNavLink(doc,sides.id,'Bijgerechten');

        if(!doc.getElementById('crostini-di-fegatini')){
          gridFor(doc,sides).appendChild(makeCard(doc,'crostini-di-fegatini','🇮🇹🍞','Crostini di Fegatini','Toscaanse kippenleverpaté • licht korrelig • voor op brood',['500 g kippenlevers','1 ui, fijgesneden','2 tenen knoflook, fijngehakt','3 el olijfolie','50 g boter','100 ml droge witte wijn','5–6 salieblaadjes','2 ansjovisfilets','1 el kappertjes','Zout en zwarte peper'],'Bak de ui 8–10 minuten zacht in olijfolie. Voeg knoflook, salie, ansjovis en kappertjes toe. Bak de kippenlevers 4–5 minuten mee, blus af met witte wijn en laat bijna volledig inkoken. Voeg de boter toe en pulseer kort, zodat de paté bewust licht grof en korrelig blijft. Laat minimaal 2 uur koelen en serveer op geroosterd brood.','https://image.pollinations.ai/prompt/rustic%20Italian%20crostini%20di%20fegatini%20Tuscan%20chicken%20liver%20pate%20on%20toasted%20baguette%20wooden%20board%20warm%20natural%20light%20realistic%20food%20photography%20no%20text?width=640&height=568&seed=18473&nologo=true'));
        }
        return !!doc.getElementById('sticky-korean-honey-chili-saus') && !!doc.getElementById('crostini-di-fegatini');
      }

      var tries=0;
      var timer=setInterval(function(){tries++; if(inject() || tries>40) clearInterval(timer);},250);
      document.getElementById('buikboek-frame').addEventListener('load',function(){inject(); setTimeout(inject,500); setTimeout(inject,1500);});
      window.addEventListener('pageshow',inject);
    })();
  </script>
</body>
</html>
