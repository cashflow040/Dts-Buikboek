<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Buikboek</title>
  <link rel="icon" type="image/jpeg" sizes="192x192" href="buikboek-icon-192.jpg?v=200">
  <link rel="shortcut icon" type="image/jpeg" href="buikboek-icon-192.jpg?v=200">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=10">
  <link rel="manifest" href="site.webmanifest?v=200">
  <meta name="theme-color" content="#090806">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Buikboek">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Buikboek">
  <style>
    html,body{margin:0;width:100%;height:100%;background:#090806;overflow:hidden}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#090806}
  </style>
</head>
<body>
  <iframe id="buikboek-frame" src="kookboek-v15-updated-specials-1.html?v=definitief-3" title="Buikboek"></iframe>
  <script>
    function recipeCard(doc,id,emoji,title,subtitle,ingredients,method){
      const card=doc.createElement('article');
      card.className='recipe-card';
      card.id=id;
      card.innerHTML=`
        <div class="recipe-head">
          <div class="emoji">${emoji}</div>
          <div><h3>${title}</h3><p>${subtitle}</p></div>
        </div>
        <ul>${ingredients.map(x=>`<li>${x}</li>`).join('')}</ul>
        <div class="method"><b>Bereiding:</b> ${method}</div>`;
      return card;
    }

    function findSection(doc,pattern){
      return [...doc.querySelectorAll('.section, section')].find(section=>{
        const heading=section.querySelector('h1,h2,h3');
        return heading && pattern.test(heading.textContent.trim());
      });
    }

    function ensureGrid(doc,section){
      let grid=section.querySelector('.grid');
      if(!grid){grid=doc.createElement('div');grid.className='grid';section.appendChild(grid)}
      return grid;
    }

    function addRecipes(){
      const frame=document.getElementById('buikboek-frame');
      const doc=frame.contentDocument||frame.contentWindow.document;
      if(!doc||!doc.body) return;

      if(!doc.getElementById('sticky-korean-honey-chili-saus')){
        let sauceSection=findSection(doc,/sausjes\s*&\s*dips|sauzen\s*&\s*dips|sausjes|sauzen/i);
        if(!sauceSection){
          sauceSection=doc.createElement('section');
          sauceSection.className='section gold';
          sauceSection.id='sausjes-en-dips';
          sauceSection.innerHTML='<h2>SAUSJES & DIPS</h2><div class="grid"></div>';
          const footer=doc.querySelector('.footer, footer');
          if(footer) footer.before(sauceSection); else doc.body.appendChild(sauceSection);
        }
        ensureGrid(doc,sauceSection).appendChild(recipeCard(
          doc,
          'sticky-korean-honey-chili-saus',
          '🍯🌶️',
          'Sticky Korean Honey Chili Saus',
          'Pittig zoet • honingachtig • zonder koken',
          ['3 el honing','1 el gochujang','1 el sweet chilisaus','1 tl sojasaus','1 tl rijstazijn of natuurazijn','Klein scheutje sesamolie, optioneel','Snufje MSG, optioneel'],
          'Meng alles koud tot een gladde, kleverige saus. Lekker over hete krokante kip of als dip. Meer honing maakt hem zoeter, meer gochujang pittiger en meer azijn frisser.'
        ));
      }

      if(!doc.getElementById('crostini-di-fegatini')){
        let sideSection=findSection(doc,/^bijgerechten$/i);
        if(!sideSection){
          sideSection=doc.createElement('section');
          sideSection.className='section gold';
          sideSection.id='bijgerechten';
          sideSection.innerHTML='<h2>BIJGERECHTEN</h2><div class="grid"></div>';
          const footer=doc.querySelector('.footer, footer');
          if(footer) footer.before(sideSection); else doc.body.appendChild(sideSection);
        }
        ensureGrid(doc,sideSection).appendChild(recipeCard(
          doc,
          'crostini-di-fegatini',
          '🇮🇹🍞',
          'Crostini di Fegatini',
          'Toscaanse kippenleverpaté • licht korrelig • voor op brood',
          ['500 g kippenlevers','1 ui, fijngesneden','2 tenen knoflook, fijngehakt','3 el olijfolie','50 g boter','100 ml droge witte wijn','5–6 salieblaadjes','2 ansjovisfilets','1 el kappertjes','Zout en zwarte peper'],
          'Bak de ui 8–10 minuten zacht in olijfolie. Voeg knoflook, salie, ansjovis en kappertjes toe. Bak de kippenlevers 4–5 minuten mee, blus af met witte wijn en laat bijna volledig inkoken. Voeg de boter toe en pulseer kort, zodat de paté bewust licht grof en korrelig blijft. Laat minimaal 2 uur koelen en serveer op geroosterd brood.'
        ));
      }
    }

    const frame=document.getElementById('buikboek-frame');
    frame.addEventListener('load',()=>{
      setTimeout(addRecipes,250);
      setTimeout(addRecipes,1000);
    });
  </script>
</body>
</html>
